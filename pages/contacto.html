<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuintaMuebles | Nosotros</title>
  <link rel="icon" href="../img/icono/LOGO-ALTA.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="../js/general.js"></script>
  <script src="../js/modal.js"></script>
</head>
<body>
  <div id="navbar-container"></div>

    <section class="hero-section">
    <div class="overlay">
        <h1>Contacto</h1>
        <p><a href="index.html">INICIO</a> › CONTACTO</p>
    </div>
    </section>

    <section class="contact-section">
    <div class="contact-info">
        <p class="datos-de-contacto">DATOS DE CONTACTO</p>
        <h2>Contáctanos</h2>
        <p><strong>Dirección:</strong> Bogotá D.C, Colombia</p>
        <p><strong>Correo Electrónico:</strong> quintamuebles@gmail.com</p>
        <p><strong>Teléfono:</strong> +57 (320) 324 7553</p>
        <div class="social-icons">
            <a href="https://www.instagram.com/quinta.muebles_" target="_blank"><img src="../img/icono/instagram.png" alt="Instagram"></a> 
            </div>
    </div>
    <div class="contact-form">
        <form>
            <div class="form-row">
                <input type="text" placeholder="Nombre" required>
                <input type="text" placeholder="Apellido" required>
            </div>
            <input type="email" placeholder="Correo Electrónico" required>
            <textarea placeholder="Mensaje" required></textarea>
            <div class="checkbox-group">
                <input type="checkbox" id="privacy" name="privacy" required>
                <label for="privacy">He leído y acepto la <a href="#" onclick="abrirModal('politica-privacidad.html')">Política de Privacidad</a>*</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="promotions" name="promotions">
                <label for="promotions">Acepto recibir información y promociones por correo electrónico*</label>
            </div>
            <button type="submit">ENVIAR MENSAJE</button>
        </form>
    </div>
</section>

  <div id="modal"></div>
  <div id="whatsapp"></div>
</body>

<footer>
   <div id="footer"></div>
</footer>
</html>
